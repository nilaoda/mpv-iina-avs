name: Build macOS libmpv bundle

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish build outputs to GitHub Releases'
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release tag to publish to (leave empty to auto-generate when publishing)'
        required: false
        type: string

env:
  FFMPEG_VERSION: '7.1.3'
  LICENSE_FLAVOR: 'gpl'
  TARGET_ARCH: 'arm64'
  MPV_REF: 'v0.40.0'
  BREW_PACKAGES: >-
    meson ninja pkg-config cmake nasm sdl2
    mujs luajit lua libass libarchive rubberband uchardet
    jpeg-turbo little-cms2
    freetype fontconfig fribidi harfbuzz glib gnutls dav1d
    libplacebo shaderc molten-vk vulkan-loader
    jpeg-xl libsamplerate snappy speex libsoxr zeromq zimg

jobs:
  build-macos-bundle:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install $BREW_PACKAGES

      - name: Build media stack
        run: |
          chmod +x tools/*.sh
          ./tools/build_all_macos.sh

      - name: Compute release metadata
        if: ${{ inputs.publish_release }}
        id: release_meta
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ -n "$INPUT_TAG" ]]; then
            tag="$INPUT_TAG"
          else
            tag="mpv-iina-avs-ffmpeg-${FFMPEG_VERSION}-mpv-${MPV_REF}-$(date -u +%Y%m%d-%H%M%S)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=macOS libmpv bundle $tag" >> "$GITHUB_OUTPUT"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: iina-mpv-bundle-macos
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          files: artifacts/*
